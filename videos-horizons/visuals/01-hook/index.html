<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
const TOTAL = 14;
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });

// BG glow breathing — anchors composition duration
tl.fromTo("#bg-glow",
  { scale: 0.88 },
  { scale: 1.22, duration: TOTAL / 2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 0);

// Structural lines draw in
tl.fromTo("#line-top",    { scaleX: 0 }, { scaleX: 1, duration: 0.75, ease: "expo.out" }, 0.1);
tl.fromTo("#line-bottom", { scaleX: 0 }, { scaleX: 1, duration: 0.55, ease: "power3.out" }, 0.3);
tl.fromTo("#v-sep",       { scaleY: 0 }, { scaleY: 1, duration: 0.85, ease: "power2.out" }, 0.4);

// LEFT: entrance (container handles x/scale/opacity; children ride along)
tl.fromTo("#left-content",
  { x: -90, opacity: 0, scale: 0.93 },
  { x: 0, opacity: 1, scale: 1, duration: 0.65, ease: "expo.out" }, 0.7);

// Chips cascade
tl.fromTo("#chip-1", { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.36, ease: "back.out(1.5)" }, 1.9);
tl.fromTo("#chip-2", { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.36, ease: "back.out(1.5)" }, 2.1);
tl.fromTo("#chip-3", { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.36, ease: "back.out(1.5)" }, 2.3);
tl.fromTo("#chip-4", { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.36, ease: "back.out(1.5)" }, 2.5);

// Arrow draws left → right
tl.fromTo("#arrow-line", { scaleX: 0 }, { scaleX: 1, duration: 0.42, ease: "power3.out" }, 3.8);
tl.fromTo("#arrow-head", { opacity: 0, x: -10 }, { opacity: 1, x: 0, duration: 0.2, ease: "power2.out" }, 4.14);

// RIGHT: entrance from the right
tl.fromTo("#right-content",
  { x: 80, opacity: 0, scale: 0.93 },
  { x: 0, opacity: 1, scale: 1, duration: 0.65, ease: "expo.out" }, 4.4);

// Brand bar fades in
tl.fromTo("#brand-name", { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.45, ease: "sine.out" }, 5.4);
tl.fromTo("#course-tag", { opacity: 0 },        { opacity: 1,       duration: 0.35, ease: "sine.out" }, 5.65);

// Ambient float (y only, no conflict with x/scale entrance)
tl.to("#left-content",  { y: -10, duration: 3.2, ease: "sine.inOut", yoyo: true,
  repeat: Math.ceil((TOTAL - 7) / 6.4) }, 7);
tl.to("#right-content", { y:   8, duration: 3.8, ease: "sine.inOut", yoyo: true,
  repeat: Math.ceil((TOTAL - 7.5) / 7.6) }, 7.5);

window.__timelines["visual-01-hook"] = tl;

// Autoplay when opened directly in the browser (not via HyperFrames player)
if (typeof window.__hyperframes === "undefined") tl.play();
</script>
